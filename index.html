<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" >
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 找房助手新版高保真交互原型</title>
  <style>
    :root {
      --purple: #7b2cbf;
      --purple2: #8e44d8;
      --lavender: #f4eefb;
      --ink: #201a2f;
      --muted: #71677f;
      --line: #eadff4;
      --shadow: 0 22px 60px rgba(54, 17, 77, .22);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 10%, rgba(142,68,216,.20), transparent 28%),
        radial-gradient(circle at 84% 14%, rgba(80,192,170,.14), transparent 24%),
        linear-gradient(135deg, #fbf8ff, #f0e5fb);
      padding: 28px 18px;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 410px 1fr;
      gap: 34px;
      align-items: start;
    }
    .phone {
      width: 390px;
      height: 844px;
      margin: 0 auto;
      border-radius: 44px;
      overflow: hidden;
      border: 10px solid #171221;
      box-shadow: var(--shadow);
      background: #fff;
      position: sticky;
      top: 24px;
    }
    .screen {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translateX(18px) scale(.992);
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
      background: #fff;
    }
    .screen.active {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }
    .screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }
    .hotspot {
      position: absolute;
      z-index: 3;
      border: 0;
      border-radius: 18px;
      background: rgba(123,44,191,0);
      cursor: pointer;
      font-size: 0;
    }
    .hotspot:focus-visible {
      outline: 3px solid rgba(123,44,191,.55);
      outline-offset: 2px;
    }
    .toast {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      z-index: 10;
      border-radius: 18px;
      padding: 12px 14px;
      background: rgba(32,26,47,.92);
      color: #fff;
      font-size: 13px;
      line-height: 1.4;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .panel {
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(234,223,244,.9);
      border-radius: 26px;
      box-shadow: 0 12px 30px rgba(68,29,95,.12);
      padding: 22px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 18px;
    }
    .tab-btn,
    .flow-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 18px;
      padding: 12px;
      color: var(--ink);
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 6px 14px rgba(68,29,95,.06);
    }
    .tab-btn {
      text-align: center;
      font-weight: 800;
      color: var(--muted);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--purple), var(--purple2));
      color: #fff;
      border-color: transparent;
    }
    .flow {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .flow-btn strong {
      display: block;
      color: var(--purple);
      margin-bottom: 4px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(5, minmax(0,1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .thumb {
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: var(--ink);
    }
    .thumb img {
      width: 100%;
      aspect-ratio: 9 / 16;
      object-fit: cover;
      border-radius: 16px;
      border: 2px solid transparent;
      box-shadow: 0 8px 18px rgba(68,29,95,.12);
      background: #fff;
      transition: transform .16s ease, border-color .16s ease;
    }
    .thumb.active img {
      border-color: var(--purple);
      transform: translateY(-3px);
    }
    .thumb span {
      display: block;
      margin-top: 7px;
      font-size: 12px;
      color: #4f455f;
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
    }
    .hint {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #f3e8ff;
      color: #5f248f;
      font-size: 13px;
      line-height: 1.6;
    }
    @media (max-width: 920px) {
      body { padding: 18px 12px; }
      .wrap { grid-template-columns: 1fr; }
      .phone { position: relative; top: 0; width: min(390px, calc(100vw - 24px)); height: min(844px, calc(100vh - 24px)); min-height: 650px; }
      .gallery { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .flow { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="phone" aria-label="新版手机交互原型">

      <div class="tabs" id="tabButtons"></div>

      <div class="flow">
        <button class="flow-btn" data-go="01"><strong>地图找房</strong>首页 → 筛选 → 服务地图 → 详情</button>
        <button class="flow-btn" data-go="05"><strong>AI 助手</strong>首页 → 找房 → 收藏对比 → 历史</button>
        <button class="flow-btn" data-go="09"><strong>社区</strong>首页 → 帖子 → 标签聚合 → 他人主页</button>
        <button class="flow-btn" data-go="14"><strong>消息</strong>房东 / 私信 / 评论 / 系统</button>
        <button class="flow-btn" data-go="18"><strong>我的</strong>收藏 / 发布 / AI历史页内切换</button>
        <button class="flow-btn" data-go="21"><strong>个人资料</strong>点击昵称铅笔进入编辑页</button>
      </div>

      <div class="hint">交互说明：手机里的大图是新版 GPT 高保真页面，透明热区负责跳转。点击右侧缩略图或手机画面即可演示流程。</div>

      <div class="gallery" id="gallery"></div>
    </aside>
  </main>

    const bottomNav = [
      ['01', 2, 91, 16, 8, '地图'],
      ['09', 20, 91, 16, 8, '社区'],
      ['05', 38, 91, 18, 8, 'AI助手'],
      ['14', 58, 91, 16, 8, '消息'],
      ['18', 76, 91, 18, 8, '我的']
    ];

    const phone = document.querySelector('.phone');
    const gallery = document.querySelector('#gallery');
    const tabButtons = document.querySelector('#tabButtons');
    const toast = document.querySelector('#toast');
    let toastTimer = null;

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    function makeScreen(screen) {
      const article = document.createElement('article');
      article.className = 'screen';
      article.id = `screen-${screen.id}`;
      article.innerHTML = `<img src="${screen.img}" alt="${screen.title}">`;
      const pageHotspots = [...(hot[screen.id] || []), ...bottomNav];
      pageHotspots.forEach(([go, x, y, w, h, label]) => {
        const btn = document.createElement('button');
        btn.className = 'hotspot';
        btn.style.left = `${x}%`;
        btn.style.top = `${y}%`;
        btn.style.width = `${w}%`;
        btn.style.height = `${h}%`;
        btn.setAttribute('aria-label', label);
        btn.addEventListener('click', () => {
          goTo(go);
          showToast(label);
        });
        article.appendChild(btn);
      });
      phone.appendChild(article);
    }

    function makeThumb(screen) {
      const btn = document.createElement('button');
      btn.className = 'thumb';
      btn.dataset.id = screen.id;
      btn.innerHTML = `<img src="${screen.img}" alt="${screen.title}"><span>${screen.id}. ${screen.title}</span>`;
      btn.addEventListener('click', () => goTo(screen.id));
      gallery.appendChild(btn);
    }

    function makeTabs() {
      ['地图','社区','AI助手','消息','我的'].forEach(tab => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        btn.textContent = tab;
        const first = screens.find(s => s.tab === tab);
        btn.addEventListener('click', () => goTo(first.id));
        tabButtons.appendChild(btn);
      });
    }

    function goTo(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === `screen-${id}`));
      document.querySelectorAll('.thumb').forEach(t => t.classList.toggle('active', t.dataset.id === id));
      const current = screens.find(s => s.id === id);
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.textContent === current.tab));
    }

    screens.forEach(screen => {
      makeScreen(screen);
      makeThumb(screen);
    });
    ['18', '19', '20'].forEach(id => {
      const screen = document.querySelector(`#screen-${id}`);
      screen.addEventListener('click', event => {
        const rect = screen.getBoundingClientRect();
        const x = ((event.clientX - rect.left) / rect.width) * 100;
        const y = ((event.clientY - rect.top) / rect.height) * 100;
        if (y < 27 || y > 47) return;
        if (x < 34) goTo('18');
        else if (x < 66) goTo('19');
        else goTo('20');
      });
    });
    makeTabs();
    document.querySelectorAll('.flow-btn').forEach(btn => btn.addEventListener('click', () => goTo(btn.dataset.go)));
    goTo('01');
  </script>
</body>
</html>
